{% extends "base.html" %}
{% block title %}Profile — AI Next Gen{% endblock %}

{% block head_extra %}
<style>
  .profile-layout { padding: calc(var(--nav-height) + var(--space-8)) 0 var(--space-12); }
  .profile-grid { display: grid; grid-template-columns: 1fr 1fr; gap: var(--space-6); }
  .profile-avatar { width: 72px; height: 72px; border-radius: var(--radius-full); background: var(--gradient-primary); display: flex; align-items: center; justify-content: center; font-size: var(--text-2xl); font-weight: 700; color: #fff; margin-bottom: var(--space-4); }
  .profile-name { font-size: var(--text-2xl); font-weight: 700; margin-bottom: var(--space-1); }
  .profile-email { font-size: var(--text-sm); color: var(--text-tertiary); }
  .profile-id { font-family: var(--font-mono); font-size: var(--text-xs); color: var(--text-muted); margin-top: var(--space-2); }
  .profile-section { margin-bottom: var(--space-6); }
  .profile-section-title { font-size: var(--text-lg); font-weight: 600; margin-bottom: var(--space-5); }
  .result-bar { display: flex; align-items: center; gap: var(--space-3); margin-bottom: var(--space-3); }
  .result-bar-label { width: 140px; font-size: var(--text-sm); color: var(--text-secondary); flex-shrink: 0; }
  .result-bar-track { flex: 1; height: 8px; background: var(--bg-secondary); border-radius: var(--radius-full); overflow: hidden; }
  .result-bar-fill { height: 100%; border-radius: var(--radius-full); transition: width 1s var(--ease-out); }
  .result-bar-value { width: 50px; text-align: right; font-family: var(--font-mono); font-size: var(--text-sm); font-weight: 600; }
  @media (max-width: 768px) { .profile-grid { grid-template-columns: 1fr; } }
</style>
{% endblock %}

{% block content %}
<div class="profile-layout">
  <div class="container">
    <div class="profile-grid">
      <div>
        <div class="glass-card glass-card-lg" style="margin-bottom:var(--space-6);">
          <div class="profile-avatar" id="profileAvatar">?</div>
          <div class="profile-name" id="profileName">Loading...</div>
          <div class="profile-email" id="profileEmail"></div>
          <div class="profile-id" id="profileId"></div>
        </div>

        <div class="glass-card glass-card-lg">
          <div class="profile-section-title">Edit Profile</div>
          <form id="profileForm" style="display:flex;flex-direction:column;gap:var(--space-4);">
            <div class="form-group">
              <label class="form-label">Full Name</label>
              <input class="form-input" type="text" id="pName" required>
            </div>
            <div class="form-group">
              <label class="form-label">Phone</label>
              <input class="form-input" type="tel" id="pPhone" required>
            </div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:var(--space-4);">
              <div class="form-group">
                <label class="form-label">College</label>
                <input class="form-input" type="text" id="pCollege" required>
              </div>
              <div class="form-group">
                <label class="form-label">Department</label>
                <input class="form-input" type="text" id="pDept" required>
              </div>
            </div>
            <div class="form-group">
              <label class="form-label">Year</label>
              <select class="form-select" id="pYear" required>
                <option value="1">1st Year</option>
                <option value="2">2nd Year</option>
                <option value="3">3rd Year</option>
                <option value="4">4th Year</option>
              </select>
            </div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:var(--space-4);">
              <div class="form-group">
                <label class="form-label">LinkedIn</label>
                <input class="form-input" type="url" id="pLinkedin">
              </div>
              <div class="form-group">
                <label class="form-label">GitHub</label>
                <input class="form-input" type="url" id="pGithub">
              </div>
            </div>
            <button type="submit" class="btn btn-primary" id="saveBtn">Save Changes</button>
          </form>
        </div>
      </div>

      <div>
        <div class="glass-card glass-card-lg" id="resultsCard" style="display:none;">
          <div class="profile-section-title">Challenge Results</div>
          <div id="resultsBars"></div>
          <div style="margin-top:var(--space-6);padding-top:var(--space-5);border-top:1px solid var(--glass-border);display:flex;justify-content:space-between;align-items:center;">
            <span style="font-size:var(--text-sm);color:var(--text-secondary);">Final Score</span>
            <span style="font-family:var(--font-display);font-size:var(--text-3xl);font-weight:700;color:var(--accent-light);" id="finalScore">0</span>
          </div>
        </div>

        <div class="glass-card glass-card-lg" style="margin-top:var(--space-6);">
          <div class="profile-section-title">Achievements</div>
          <div id="profileBadges" style="display:flex;flex-wrap:wrap;gap:var(--space-3);"></div>
        </div>

        <div class="glass-card glass-card-lg" style="margin-top:var(--space-6);" id="selectionCard">
          <div class="profile-section-title">Selection Status</div>
          <div id="selectionStatus"></div>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script src="/static/js/pages/profile.js"></script>
{% endblock %}
