{% extends "base.html" %}

{% block title %}Register — AI Next Gen{% endblock %}

{% block content %}
<div class="auth-layout grid-bg">
  <div class="auth-card glass-card glass-card-glow reveal" style="max-width: 520px;">
    <div class="auth-header">
      <div class="auth-logo">
        <a href="/"><img src="/static/img/logo.jpg" alt="AI Next Gen"></a>
      </div>
      <h2 class="auth-title">Join AI Next Gen</h2>
      <p class="auth-subtitle">Register to take the AI Selection Challenge.</p>
    </div>

    <form class="auth-form" id="signupForm">
      <div class="form-group">
        <label class="form-label" for="name">Full Name</label>
        <input class="form-input" type="text" id="name" placeholder="Your full name" required>
      </div>

      <div style="display:grid; grid-template-columns: 1fr 1fr; gap: var(--space-4);">
        <div class="form-group">
          <label class="form-label" for="college">College</label>
          <input class="form-input" type="text" id="college" placeholder="College name" required>
        </div>
        <div class="form-group">
          <label class="form-label" for="department">Department</label>
          <input class="form-input" type="text" id="department" placeholder="e.g. CSE" required>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label" for="year">Year of Study</label>
        <select class="form-select" id="year" required>
          <option value="">Select year</option>
          <option value="1">1st Year</option>
          <option value="2">2nd Year</option>
          <option value="3">3rd Year</option>
          <option value="4">4th Year</option>
        </select>
      </div>

      <div class="form-group">
        <label class="form-label" for="email">Email</label>
        <input class="form-input" type="email" id="email" placeholder="you@college.edu" required autocomplete="email">
      </div>

      <div class="form-group">
        <label class="form-label" for="phone">Phone</label>
        <input class="form-input" type="tel" id="phone" placeholder="+91 98765 43210" required>
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <input class="form-input" type="password" id="password" placeholder="Min 8 characters" required minlength="8" autocomplete="new-password">
        <span class="form-hint">At least 8 characters</span>
      </div>

      <div style="display:grid; grid-template-columns: 1fr 1fr; gap: var(--space-4);">
        <div class="form-group">
          <label class="form-label" for="linkedin">LinkedIn <span style="color:var(--text-muted)">(optional)</span></label>
          <input class="form-input" type="url" id="linkedin" placeholder="https://linkedin.com/in/you">
        </div>
        <div class="form-group">
          <label class="form-label" for="github">GitHub <span style="color:var(--text-muted)">(optional)</span></label>
          <input class="form-input" type="url" id="github" placeholder="https://github.com/you">
        </div>
      </div>

      <button type="submit" class="btn btn-primary" style="width:100%;" id="signupBtn">
        <span id="signupBtnText">Create Account</span>
        <span id="signupBtnSpinner" class="spinner spinner-sm" style="display:none;"></span>
      </button>

      <div id="signupError" class="form-error" style="text-align:center; display:none;"></div>
    </form>

    <div class="auth-footer">
      Already have an account? <a href="/login">Log in</a>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
(function() {
  const form = document.getElementById('signupForm');
  const btn = document.getElementById('signupBtn');
  const btnText = document.getElementById('signupBtnText');
  const btnSpinner = document.getElementById('signupBtnSpinner');
  const errorEl = document.getElementById('signupError');

  form.addEventListener('submit', async function(e) {
    e.preventDefault();
    errorEl.style.display = 'none';
    btn.disabled = true;
    btnText.textContent = 'Creating account...';
    btnSpinner.style.display = 'inline-block';

    try {
      const res = await API.post('/api/signup', {
        name: document.getElementById('name').value.trim(),
        college: document.getElementById('college').value.trim(),
        department: document.getElementById('department').value.trim(),
        year: document.getElementById('year').value,
        email: document.getElementById('email').value.trim(),
        phone: document.getElementById('phone').value.trim(),
        password: document.getElementById('password').value,
        linkedin: document.getElementById('linkedin').value.trim(),
        github: document.getElementById('github').value.trim(),
      });

      if (res.success) {
        Toast.show('Welcome!', 'Account created. Redirecting...', 'success');
        setTimeout(() => { window.location.href = '/profile'; }, 800);
      } else {
        errorEl.textContent = res.error || 'Signup failed';
        errorEl.style.display = 'block';
      }
    } catch (err) {
      errorEl.textContent = err.message || 'Network error. Please try again.';
      errorEl.style.display = 'block';
    } finally {
      btn.disabled = false;
      btnText.textContent = 'Create Account';
      btnSpinner.style.display = 'none';
    }
  });
})();
</script>
{% endblock %}
