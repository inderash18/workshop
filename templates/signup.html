<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - AI NEXT GEN 2026</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 40px 20px;
            box-sizing: border-box;
            background-color: #D8D7CE !important;
        }

        .signup-container {
            width: 100%;
            max-width: 560px;
            z-index: 10;
            position: relative;
        }

        .signup-card {
            padding: 48px 40px;
        }

        .signup-title {
            color: #222831;
            font-family: var(--font-serif);
            font-size: 26px;
            font-weight: 500;
            letter-spacing: -0.5px;
            margin: 0 0 8px 0;
            text-align: center;
        }

        .signup-subtitle {
            color: rgba(34, 40, 49, 0.7);
            font-size: 13.5px;
            font-weight: 400;
            margin: 0 0 32px 0;
            letter-spacing: 0.1px;
            text-align: center;
        }

        /* 2-column input grid */
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 28px;
        }

        .input-group input, .input-group select {
            width: 100%;
        }

        .input-group input::placeholder {
            color: rgba(34, 40, 49, 0.45);
        }

        .input-group select {
            padding-right: 28px;
            cursor: pointer;
            appearance: none;
            -webkit-appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23222831' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 18px center;
            background-size: 14px;
        }

        .input-group select option {
            background: #ffffff;
            color: #222831;
        }

        /* Footer */
        .footer-links {
            color: rgba(34, 40, 49, 0.7);
            font-size: 13px;
            text-align: center;
        }

        .footer-links a {
            color: #00A6C0;
            font-weight: 600;
            text-decoration: none;
            margin-left: 4px;
            transition: opacity 0.2s ease;
        }

        .footer-links a:hover {
            text-decoration: underline;
        }

        @media (max-width: 600px) {
            .form-grid {
                grid-template-columns: 1fr;
                gap: 12px;
            }
            .signup-card {
                padding: 40px 24px 32px 24px;
            }
            .signup-title {
                font-size: 22px;
            }
            .signup-subtitle {
                font-size: 13px;
                margin-bottom: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="signup-container">
        <div class="glass-panel signup-card">
            <h2 class="signup-title">Register</h2>
            <p class="signup-subtitle">Please enter your details to create an account.</p>

            <form id="signup-form">
                <div class="form-grid">
                    <div class="input-group">
                        <input type="text" id="name" required placeholder="Full Name" autocomplete="name">
                    </div>
                    <div class="input-group">
                        <input type="email" id="email" required placeholder="Academic Email" autocomplete="email">
                    </div>
                    <div class="input-group">
                        <input type="tel" id="phone" required placeholder="Phone Number" autocomplete="tel">
                    </div>
                    <div class="input-group">
                        <input type="text" id="college" required placeholder="College / University">
                    </div>
                    <div class="input-group">
                        <input type="text" id="department" required placeholder="Department">
                    </div>
                    <div class="input-group">
                        <select id="year" required>
                            <option value="" disabled selected>Select Year of Study</option>
                            <option value="1">1st Year</option>
                            <option value="2">2nd Year</option>
                            <option value="3">3rd Year</option>
                            <option value="4">4th Year</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <input type="password" id="password" required placeholder="Password" autocomplete="new-password">
                    </div>
                    <div class="input-group">
                        <input type="password" id="confirm-password" required placeholder="Confirm Password" autocomplete="new-password">
                    </div>
                    <div class="input-group">
                        <input type="url" id="linkedin" placeholder="LinkedIn Profile (Optional)">
                    </div>
                    <div class="input-group">
                        <input type="url" id="github" placeholder="GitHub Profile (Optional)">
                    </div>
                </div>

                <button type="submit" class="btn-futuristic" style="width: 100%; margin-bottom: 24px;">Register</button>

                <div class="footer-links">
                    Already have an account? <a href="/login">Sign in</a>
                </div>
            </form>
        </div>
    </div>

    <script>
        // Parse email parameter from URL query string to prefill the email input field
        const urlParams = new URLSearchParams(window.location.search);
        const prefilledEmail = urlParams.get('email');
        if (prefilledEmail) {
            const emailField = document.getElementById('email');
            if (emailField) {
                emailField.value = decodeURIComponent(prefilledEmail);
            }
        }

        document.getElementById('signup-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirm-password').value;
            
            if (password !== confirmPassword) {
                alert("Passwords do not match.");
                return;
            }

            const signupData = {
                name: document.getElementById('name').value.trim(),
                email: document.getElementById('email').value.trim(),
                phone: document.getElementById('phone').value.trim(),
                college: document.getElementById('college').value.trim(),
                department: document.getElementById('department').value.trim(),
                year: parseInt(document.getElementById('year').value),
                password: password,
                linkedin: document.getElementById('linkedin').value.trim(),
                github: document.getElementById('github').value.trim()
            };

            try {
                const response = await fetch('/api/signup', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(signupData)
                });
                const result = await response.json();
                
                if (response.ok) {
                    // Redirect to dashboard on success (API sets session automatically)
                    window.location.href = '/dashboard';
                } else {
                    alert(result.error || 'Signup failed');
                }
            } catch (err) {
                // Local Sandbox Fallback Mode
                const raw = localStorage.getItem('candidates');
                let list = raw ? JSON.parse(raw) : [];
                
                if (list.some(c => c.email.toLowerCase() === signupData.email.toLowerCase())) {
                    alert("Email address is already registered.");
                    return;
                }
                
                const c_id = `AINEXT2026-${Math.floor(1000 + Math.random() * 9000)}`;
                const s_id = crypto.randomUUID ? crypto.randomUUID() : Math.random().toString(36).substring(2);
                
                const candidateObj = {
                    candidate_id: c_id,
                    session_id: s_id,
                    name: signupData.name,
                    email: signupData.email,
                    phone: signupData.phone,
                    college: signupData.college,
                    department: signupData.department,
                    year: signupData.year,
                    password: signupData.password,
                    linkedin: signupData.linkedin,
                    github: signupData.github,
                    started: false,
                    completed: false,
                    level1_ans: '', level2_ans: '', level3_ans: '', level4_ans: '', level5_ans: '', level6_ans: '', level7_ans: '',
                    time_taken: 0,
                    tab_switches: 0,
                    violation_count: 0,
                    violation_logs: '[]',
                    backspace_count: 0,
                    typing_speed_avg: 0.0,
                    typing_pattern_variance: 0.0,
                    mouse_moves_count: 0,
                    idle_duration: 0,
                    webcam_status: 'Active',
                    location_data: '13.0827, 80.2707',
                    score_logic: 0,
                    score_creativity: 0,
                    score_ai_knowledge: 0,
                    score_problem_solving: 0,
                    score_time: 0,
                    score_final: 0,
                    badges: '[]',
                    selected: 0,
                    created_at: new Date().toISOString()
                };
                
                list.push(candidateObj);
                localStorage.setItem('candidates', JSON.stringify(list));
                
                // Set temporary session in local storage for local dashboards
                localStorage.setItem('active_session_email', signupData.email);
                localStorage.setItem('active_session_candidate_id', c_id);
                
                alert("Server offline. Registered details locally in sandbox database.");
                window.location.href = '/dashboard';
            }
        });
    </script>
</body>
</html>
