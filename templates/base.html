<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{% block meta_description %}AI Next Gen — Premium AI Workshop Selection Portal for College Students{% endblock %}">
  <title>{% block title %}AI Next Gen{% endblock %}</title>

  <link rel="icon" href="/static/img/logo.jpg" type="image/jpeg">

  <link rel="stylesheet" href="/static/css/design-system.css">
  <link rel="stylesheet" href="/static/css/components.css">
  <link rel="stylesheet" href="/static/css/layouts.css">
  <link rel="stylesheet" href="/static/css/animations.css">
  <link rel="stylesheet" href="/static/css/responsive.css">

  {% block head_extra %}{% endblock %}
</head>
<body>
  <nav class="nav" id="mainNav">
    <div class="nav-inner">
      <a href="/" class="nav-brand">
        <img src="/static/img/logo.jpg" alt="AI Next Gen">
        <span class="nav-brand-text">AI Next Gen<span class="nav-brand-dot"></span></span>
      </a>

      <ul class="nav-links" id="navLinks">
        <li><a href="/" class="{% if request.endpoint == 'dashboard.index' %}active{% endif %}">Home</a></li>
        <li><a href="/leaderboard" class="{% if request.endpoint == 'leaderboard.leaderboard_page' %}active{% endif %}">Leaderboard</a></li>
        <li id="navChallenge" style="display:none"><a href="/challenge">Challenge</a></li>
      </ul>

      <div class="nav-actions">
        <div id="navGuest">
          <a href="/login" class="btn btn-ghost btn-sm">Log In</a>
          <a href="/signup" class="btn btn-primary btn-sm">Register</a>
        </div>
        <div id="navUser" style="display:none">
          <a href="/profile" class="btn btn-ghost btn-sm" id="navUserName"></a>
          <button class="btn btn-secondary btn-sm" id="navLogoutBtn">Logout</button>
        </div>
        <button class="nav-mobile-toggle" id="navToggle" aria-label="Toggle menu">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="3" y1="6" x2="21" y2="6"/>
            <line x1="3" y1="12" x2="21" y2="12"/>
            <line x1="3" y1="18" x2="21" y2="18"/>
          </svg>
        </button>
      </div>
    </div>
  </nav>

  <div class="toast-container" id="toastContainer"></div>

  {% block content %}{% endblock %}

  <footer class="footer">
    <div class="container">
      <div class="footer-inner">
        <p class="footer-text">&copy; 2026 AI Next Gen. All rights reserved.</p>
        <ul class="footer-links">
          <li><a href="/">Home</a></li>
          <li><a href="/leaderboard">Leaderboard</a></li>
        </ul>
      </div>
    </div>
  </footer>

  <script src="/static/js/core/api.js"></script>
  <script src="/static/js/core/auth.js"></script>
  <script src="/static/js/core/toast.js"></script>
  <script src="/static/js/app.js"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
