{% extends "base.html" %}
{% block title %}Candidates — AI Next Gen Admin{% endblock %}

{% block head %}
<style>
    body { background: var(--bg-primary); }
    
    .admin-layout {
      display: flex;
      min-height: calc(100vh - 60px);
      margin-top: 60px;
    }
    
    .admin-sidebar {
      width: 240px;
      background: var(--bg-tertiary);
      border-right: 1px solid var(--border-default);
      padding: 1.5rem 0;
      position: sticky;
      top: 60px;
      height: calc(100vh - 60px);
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
    }
    
    .sidebar-nav {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
      padding: 0 0.75rem;
    }
    
    .sidebar-link {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.7rem 1rem;
      border-radius: 8px;
      color: var(--text-secondary);
      font-size: 0.9rem;
      font-weight: 500;
      text-decoration: none;
      transition: all 0.2s;
    }
    
    .sidebar-link:hover {
      color: var(--text-primary);
      background: var(--bg-primary);
    }
    
    .sidebar-link.active {
      color: var(--text-primary);
      background: var(--bg-secondary);
      font-weight: 600;
    }
    
    .sidebar-link .icon {
      font-size: 1.1rem;
      width: 22px;
      text-align: center;
    }
    
    .sidebar-divider {
      height: 1px;
      background: var(--border-subtle);
      margin: 0.75rem;
    }
    
    .admin-main {
      flex: 1;
      padding: 2rem 2.5rem;
      max-width: calc(100% - 240px);
      overflow-y: auto;
    }
    
    .page-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2rem;
    }
    
    .page-header h1 {
      font-size: 1.75rem;
      font-weight: 700;
      color: var(--text-primary);
    }
    
    .header-actions {
      display: flex;
      gap: 0.75rem;
    }
    
    /* Search & Filters */
    .filter-bar {
      display: flex;
      gap: 1rem;
      margin-bottom: 1.5rem;
    }
    
    .search-input {
      flex: 1;
      padding: 0.65rem 1rem;
      border-radius: 8px;
      background: var(--bg-tertiary);
      border: 1px solid var(--border-default);
      color: var(--text-primary);
      font-size: 0.88rem;
      outline: none;
      transition: all 0.2s;
    }
    .search-input:focus {
      border-color: var(--accent-primary);
      box-shadow: 0 0 0 3px rgba(30, 34, 11, 0.06);
    }
    
    /* Premium Table styling */
    .table-container {
      background: var(--bg-tertiary);
      border: 1px solid var(--border-default);
      border-radius: 12px;
      box-shadow: var(--shadow-sm);
      overflow: hidden;
    }
    
    .data-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.88rem;
      text-align: left;
    }
    
    .data-table th, .data-table td {
      padding: 1rem 1.25rem;
      border-bottom: 1px solid var(--border-subtle);
    }
    
    .data-table th {
      background: var(--bg-secondary);
      font-size: 0.72rem;
      font-weight: 700;
      color: var(--text-tertiary);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    
    .data-table th.sortable {
      cursor: pointer;
      user-select: none;
    }
    .data-table th.sortable:hover {
      color: var(--text-primary);
      background: var(--border-default);
    }
    
    .data-table tr:last-child td {
      border-bottom: none;
    }
    
    .data-table tr:hover td {
      background: var(--bg-primary);
    }
    
    .candidate-name {
      font-weight: 600;
      color: var(--text-primary);
    }
    
    /* Badge badges */
    .badge {
      display: inline-block;
      padding: 0.25rem 0.65rem;
      border-radius: 999px;
      font-size: 0.68rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .badge-success { background: var(--color-success-bg); color: var(--color-success); border: 1px solid var(--color-success-border); }
    .badge-warning { background: var(--color-warning-bg); color: var(--color-warning); border: 1px solid var(--color-warning-border); }
    .badge-danger { background: var(--color-danger-bg); color: var(--color-danger); border: 1px solid var(--color-danger-border); }
    .badge-secondary { background: var(--border-subtle); color: var(--text-secondary); border: 1px solid var(--border-default); }

    /* Detail overlay modal */
    .overlay {
      position: fixed;
      inset: 0;
      z-index: 10000;
      opacity: 0;
      visibility: hidden;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .overlay.active {
      opacity: 1;
      visibility: visible;
    }
    .overlay-backdrop {
      position: absolute;
      inset: 0;
      background: rgba(30, 34, 11, 0.4);
      backdrop-filter: blur(4px);
    }
    .overlay-content {
      position: relative;
      background: var(--bg-tertiary);
      border: 1px solid var(--border-default);
      border-radius: 14px;
      box-shadow: var(--shadow-xl);
      max-width: 650px;
      width: 100%;
      max-height: 90vh;
      display: flex;
      flex-direction: column;
      z-index: 1;
      transform: translateY(20px);
      transition: transform 0.3s ease;
    }
    .overlay.active .overlay-content {
      transform: translateY(0);
    }
    .overlay-header {
      padding: 1.25rem 1.5rem;
      border-bottom: 1px solid var(--border-subtle);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .overlay-header h3 {
      font-size: 1.15rem;
      font-weight: 700;
      color: var(--text-primary);
    }
    .overlay-close {
      font-size: 1.5rem;
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
    }
    .overlay-close:hover {
      color: var(--text-primary);
    }
    .overlay-body {
      padding: 1.5rem;
      overflow-y: auto;
    }
    .overlay-footer {
      padding: 1.25rem 1.5rem;
      border-top: 1px solid var(--border-subtle);
      display: flex;
      justify-content: flex-end;
      gap: 0.75rem;
    }
    .detail-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.25rem;
    }
    .detail-item {
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
    }
    .detail-item.full-width {
      grid-column: 1 / -1;
    }
    .detail-item label {
      font-size: 0.68rem;
      font-weight: 600;
      color: var(--text-tertiary);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .detail-item span {
      font-size: 0.95rem;
      color: var(--text-primary);
    }
    .detail-item pre {
      background: var(--bg-primary);
      border: 1px solid var(--border-default);
      border-radius: 6px;
      padding: 1rem;
      font-size: 0.8rem;
      color: var(--text-secondary);
      overflow-x: auto;
      max-height: 200px;
    }
    
    .btn {
      padding: 0.55rem 1rem;
      border-radius: 6px;
      font-size: 0.8rem;
      font-weight: 600;
      border: none;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
    }
    .btn-secondary {
      background: var(--bg-secondary);
      color: var(--text-primary);
      border: 1px solid var(--border-default);
    }
    .btn-secondary:hover {
      background: var(--border-default);
    }
    .btn-primary {
      background: var(--gradient-brand);
      color: var(--text-inverse);
    }
    .btn-primary:hover {
      opacity: 0.9;
    }
    .btn-ghost {
      background: none;
      border: none;
      color: var(--text-secondary);
      padding: 0.4rem;
    }
    .btn-ghost:hover {
      color: var(--text-primary);
      background: var(--bg-primary);
    }

    @media (max-width: 768px) {
      .admin-sidebar { display: none; }
      .admin-main { max-width: 100%; padding: 1.5rem; }
      .filter-bar { flex-direction: column; }
    }
</style>
{% endblock %}

{% block content %}
<div class="admin-layout">
    <!-- Sidebar navigation -->
    <aside class="admin-sidebar">
        <nav class="sidebar-nav">
            <a href="/admin" class="sidebar-link"><span class="icon">📊</span> Dashboard</a>
            <a href="/admin/tests" class="sidebar-link"><span class="icon">📝</span> Tests</a>
            <a href="/admin/candidates" class="sidebar-link active"><span class="icon">👥</span> Candidates</a>
            <div class="sidebar-divider"></div>
            <a href="/admin/settings" class="sidebar-link"><span class="icon">⚙️</span> Settings</a>
            <a href="/admin/logs" class="sidebar-link"><span class="icon">📋</span> Logs</a>
        </nav>
    </aside>
    
    <main class="admin-main">
        <!-- Header -->
        <div class="page-header">
            <h1>Candidates</h1>
            <div class="header-actions">
                <button class="btn btn-secondary export-btn" id="export-csv">📥 Export CSV</button>
                <button class="btn btn-primary auto-shortlist-btn" id="auto-shortlist">✨ Auto Shortlist</button>
            </div>
        </div>
        
        <!-- Filters -->
        <div class="filter-bar">
            <input type="text" class="search-input" id="candidate-search" placeholder="Search by name, email, or candidate ID...">
        </div>
        
        <!-- Data Table Container -->
        <div class="table-container" id="candidates-table">
            <div style="padding:2rem; text-align:center; color:var(--text-secondary);">Loading candidates list...</div>
        </div>
    </main>
</div>
{% endblock %}

{% block scripts %}
<script src="/static/js/pages/admin.js"></script>
{% endblock %}
