{% extends "base.html" %}
{% block title %}Admin Login — AI Next Gen{% endblock %}

{% block head %}
<style>
    .auth-page{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem;background:var(--bg-primary);position:relative;overflow:hidden}
    .auth-page::before{content:'';position:absolute;inset:0;background-image:linear-gradient(rgba(30,34,11,.015) 1px,transparent 1px),linear-gradient(90deg,rgba(30,34,11,.015) 1px,transparent 1px);background-size:50px 50px}
    .auth-page::after{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:radial-gradient(circle at 30% 40%,rgba(30,34,11,.03),transparent 50%);pointer-events:none}
    .auth-card{position:relative;z-index:1;width:100%;max-width:400px;padding:2.5rem;border-radius:16px;background:var(--bg-tertiary);border:1px solid var(--border-default);box-shadow:var(--shadow-lg)}
    .auth-header{text-align:center;margin-bottom:2rem}
    .auth-logo{width:56px;height:56px;border-radius:12px;object-fit:cover;margin-bottom:1rem;box-shadow:var(--shadow-sm)}
    .auth-header h1{font-size:1.5rem;font-weight:700;color:var(--text-primary);margin-bottom:.25rem}
    .auth-header .subtitle{font-size:.8rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:.08em;font-weight:600}
    .auth-header p{font-size:.85rem;color:var(--text-secondary);margin-top:.5rem}
    .auth-form{display:flex;flex-direction:column;gap:1.25rem}
    .form-group{display:flex;flex-direction:column;gap:.4rem}
    .form-group label{font-size:.8rem;font-weight:600;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.05em}
    .form-group input{padding:.75rem 1rem;border-radius:8px;background:var(--bg-primary);border:1px solid var(--border-default);color:var(--text-primary);font-size:.95rem;transition:all .2s;outline:none}
    .form-group input:focus{border-color:var(--accent-primary);box-shadow:0 0 0 3px rgba(30,34,11,.08)}
    .form-group input::placeholder{color:var(--text-muted)}
    .btn-admin{width:100%;padding:.85rem;border-radius:8px;background:var(--gradient-brand);color:var(--text-inverse);font-size:.95rem;font-weight:600;border:none;cursor:pointer;transition:all .3s;position:relative;overflow:hidden}
    .btn-admin:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(30,34,11,.15)}
    .btn-admin.loading{pointer-events:none;opacity:.85}
    .btn-admin .spinner{display:none;width:18px;height:18px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;margin:0 auto}
    .btn-admin.loading .spinner{display:block}
    .btn-admin.loading .btn-text{display:none}
    @keyframes spin{to{transform:rotate(360deg)}}
    .auth-error{display:none;padding:.75rem 1rem;border-radius:8px;background:var(--color-danger-bg);border:1px solid var(--color-danger-border);color:var(--color-danger);font-size:.85rem;text-align:center}
    .auth-error.show{display:block}
    .auth-footer{text-align:center;margin-top:1.5rem;font-size:.9rem}
    .auth-footer a{color:var(--text-secondary);text-decoration:none;transition:color .2s}
    .auth-footer a:hover{color:var(--text-primary)}
</style>
{% endblock %}

{% block content %}
<div class="auth-page">
    <div class="auth-card">
        <div class="auth-header">
            <img src="/static/img/logo.jpg" alt="AI Next Gen" class="auth-logo">
            <h1>Admin Panel</h1>
            <span class="subtitle">Authorized Access Only</span>
            <p>Sign in to manage the AI Next Gen platform</p>
        </div>
        <div class="auth-error" id="adminLoginError"></div>
        <form class="auth-form" id="adminLoginForm" onsubmit="return handleAdminLogin(event)">
            <div class="form-group">
                <label>Username</label>
                <input type="text" id="adminUsername" placeholder="admin" required autocomplete="username">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="adminPassword" placeholder="Enter admin password" required autocomplete="current-password">
            </div>
            <button type="submit" class="btn-admin" id="adminLoginBtn">
                <span class="btn-text">Sign In</span>
                <div class="spinner"></div>
            </button>
        </form>
        <div class="auth-footer">
            <a href="/">&#8592; Back to site</a>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
async function handleAdminLogin(e) {
    e.preventDefault();
    const btn = document.getElementById('adminLoginBtn');
    const errEl = document.getElementById('adminLoginError');
    errEl.classList.remove('show');
    btn.classList.add('loading');
    try {
        const res = await API.post('/api/admin/login', {
            username: document.getElementById('adminUsername').value,
            password: document.getElementById('adminPassword').value
        });
        if (res.success) {
            localStorage.setItem('admin', JSON.stringify({ username: document.getElementById('adminUsername').value }));
            window.location.href = '/admin';
        } else {
            throw new Error(res.error || 'Invalid credentials');
        }
    } catch (err) {
        errEl.textContent = err.message || 'Access denied. Invalid credentials.';
        errEl.classList.add('show');
        btn.classList.remove('loading');
    }
    return false;
}
</script>
{% endblock %}
