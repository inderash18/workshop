{% extends "base.html" %}
{% block title %}Admin Login — AI Next Gen{% endblock %}

{% block content %}
<div class="auth-layout grid-bg">
  <div class="auth-card glass-card glass-card-glow reveal" style="max-width: 400px;">
    <div class="auth-header">
      <div class="auth-logo">
        <a href="/"><img src="/static/img/logo.jpg" alt="AI Next Gen"></a>
      </div>
      <h2 class="auth-title">Admin Panel</h2>
      <p class="auth-subtitle">Authorized access only.</p>
    </div>

    <form class="auth-form" id="adminLoginForm">
      <div class="form-group">
        <label class="form-label" for="username">Username</label>
        <input class="form-input" type="text" id="username" placeholder="admin" required autocomplete="username">
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <input class="form-input" type="password" id="password" placeholder="Enter password" required autocomplete="current-password">
      </div>

      <button type="submit" class="btn btn-primary" style="width:100%;" id="loginBtn">
        <span id="loginBtnText">Sign In</span>
        <span id="loginBtnSpinner" class="spinner spinner-sm" style="display:none;"></span>
      </button>

      <div id="loginError" class="form-error" style="text-align:center; display:none;"></div>
    </form>

    <div class="auth-footer">
      <a href="/" style="color:var(--text-tertiary);">&larr; Back to site</a>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
(function() {
  const form = document.getElementById('adminLoginForm');
  const btn = document.getElementById('loginBtn');
  const btnText = document.getElementById('loginBtnText');
  const btnSpinner = document.getElementById('loginBtnSpinner');
  const errorEl = document.getElementById('loginError');

  form.addEventListener('submit', async function(e) {
    e.preventDefault();
    errorEl.style.display = 'none';
    btn.disabled = true;
    btnText.textContent = 'Signing in...';
    btnSpinner.style.display = 'inline-block';

    try {
      const res = await API.post('/api/admin/login', {
        username: document.getElementById('username').value.trim(),
        password: document.getElementById('password').value,
      });

      if (res.success) {
        window.location.href = '/admin';
      } else {
        errorEl.textContent = res.error || 'Login failed';
        errorEl.style.display = 'block';
      }
    } catch (err) {
      errorEl.textContent = err.message || 'Invalid credentials';
      errorEl.style.display = 'block';
    } finally {
      btn.disabled = false;
      btnText.textContent = 'Sign In';
      btnSpinner.style.display = 'none';
    }
  });
})();
</script>
{% endblock %}
