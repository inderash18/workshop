{% extends "base.html" %}

{% block title %}Log In — AI Next Gen{% endblock %}

{% block content %}
<div class="auth-layout grid-bg">
  <div class="auth-card glass-card glass-card-glow reveal">
    <div class="auth-header">
      <div class="auth-logo">
        <a href="/"><img src="/static/img/logo.jpg" alt="AI Next Gen"></a>
      </div>
      <h2 class="auth-title">Welcome Back</h2>
      <p class="auth-subtitle">Log in to access your challenge dashboard.</p>
    </div>

    <form class="auth-form" id="loginForm">
      <div class="form-group">
        <label class="form-label" for="email">Email</label>
        <input class="form-input" type="email" id="email" placeholder="you@college.edu" required autocomplete="email">
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <input class="form-input" type="password" id="password" placeholder="Enter your password" required autocomplete="current-password">
      </div>

      <button type="submit" class="btn btn-primary" style="width:100%;" id="loginBtn">
        <span id="loginBtnText">Log In</span>
        <span id="loginBtnSpinner" class="spinner spinner-sm" style="display:none;"></span>
      </button>

      <div id="loginError" class="form-error" style="text-align:center; display:none;"></div>
    </form>

    <div class="auth-footer">
      Don't have an account? <a href="/signup">Register here</a>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
(function() {
  const form = document.getElementById('loginForm');
  const btn = document.getElementById('loginBtn');
  const btnText = document.getElementById('loginBtnText');
  const btnSpinner = document.getElementById('loginBtnSpinner');
  const errorEl = document.getElementById('loginError');

  form.addEventListener('submit', async function(e) {
    e.preventDefault();
    errorEl.style.display = 'none';
    btn.disabled = true;
    btnText.textContent = 'Logging in...';
    btnSpinner.style.display = 'inline-block';

    try {
      const res = await API.post('/api/login', {
        email: document.getElementById('email').value.trim(),
        password: document.getElementById('password').value,
      });

      if (res.success) {
        Toast.show('Welcome back!', 'Logged in successfully.', 'success');
        window.location.href = res.redirect || '/profile';
      } else {
        errorEl.textContent = res.error || 'Login failed';
        errorEl.style.display = 'block';
      }
    } catch (err) {
      errorEl.textContent = err.message || 'Network error. Please try again.';
      errorEl.style.display = 'block';
    } finally {
      btn.disabled = false;
      btnText.textContent = 'Log In';
      btnSpinner.style.display = 'none';
    }
  });
})();
</script>
{% endblock %}
