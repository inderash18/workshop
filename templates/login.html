<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - AI NEXT GEN 2026</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 0;
            background-color: #D8D7CE !important;
        }

        .login-container {
            width: 100%;
            max-width: 440px;
            padding: 24px;
            box-sizing: border-box;
            z-index: 10;
            position: relative;
        }

        .login-card {
            padding: 54px 44px 44px 44px;
        }

        /* Geometric Logo SVG styling */
        .logo-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 20px;
        }

        .logo-svg {
            color: #00A6C0;
            opacity: 0.9;
        }

        .logo-svg {
            color: #222831;
            opacity: 0.9;
        }

        .login-title {
            color: #222831;
            font-family: var(--font-serif);
            font-size: 26px;
            font-weight: 500;
            letter-spacing: -0.5px;
            margin: 0 0 8px 0;
            text-align: center;
        }

        .login-subtitle {
            color: rgba(34, 40, 49, 0.7);
            font-size: 13.5px;
            font-weight: 400;
            margin: 0 0 32px 0;
            letter-spacing: 0.1px;
            text-align: center;
        }

        .input-group {
            margin-bottom: 16px;
        }

        .input-group input {
            width: 100%;
        }

        .input-group input::placeholder {
            color: rgba(34, 40, 49, 0.45);
        }

        /* Forgot password link */
        .forgot-wrapper {
            text-align: right;
            margin-top: -6px;
            margin-bottom: 26px;
            padding-right: 12px;
        }

        .forgot-link {
            color: rgba(34, 40, 49, 0.6);
            font-size: 12px;
            text-decoration: none;
            transition: color 0.2s ease;
        }

        .forgot-link:hover {
            color: #00A6C0;
        }

        /* Google Button - Light style */
        .google-btn {
            width: 100%;
            background: rgba(255, 255, 255, 0.45);
            color: #222831;
            border: 1px solid rgba(34, 40, 49, 0.15);
            border-radius: 16px;
            padding: 14px 24px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            box-sizing: border-box;
            margin-bottom: 28px;
        }

        .google-btn:hover {
            background: rgba(255, 255, 255, 0.7);
            border-color: #00A6C0;
        }

        /* Footer */
        .footer-links {
            color: rgba(34, 40, 49, 0.7);
            font-size: 13px;
            text-align: center;
        }

        .footer-links a {
            color: #00A6C0;
            font-weight: 600;
            text-decoration: none;
            margin-left: 4px;
            transition: opacity 0.2s ease;
        }

        .footer-links a:hover {
            text-decoration: underline;
        }

        @media (max-width: 480px) {
            .login-card {
                padding: 40px 24px 32px 24px;
            }
            .login-title {
                font-size: 22px;
            }
            .login-subtitle {
                font-size: 13px;
                margin-bottom: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="glass-panel login-card">
            <!-- Stylized geometric tech logo icon -->
            <div class="logo-wrapper">
                <svg class="logo-svg" width="34" height="34" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="50" cy="50" r="42" stroke="currentColor" stroke-width="5" stroke-dasharray="14 10" />
                    <circle cx="50" cy="50" r="28" stroke="currentColor" stroke-width="5" stroke-dasharray="8 8" opacity="0.8" />
                    <circle cx="50" cy="50" r="14" stroke="currentColor" stroke-width="5" stroke-dasharray="4 4" opacity="0.6" />
                    <circle cx="50" cy="50" r="4" fill="currentColor" opacity="0.9" />
                </svg>
            </div>

            <h2 class="login-title">Sign In</h2>
            <p class="login-subtitle">Please enter your details to sign in.</p>

            <form id="login-form">
                <div class="input-group">
                    <input type="email" id="email" required placeholder="Enter your email address" autocomplete="email">
                </div>
                <div class="input-group">
                    <input type="password" id="password" required placeholder="Password" autocomplete="current-password">
                </div>
                
                <div class="forgot-wrapper">
                    <a href="#" onclick="alert('Contact the selection board helper to restore academic identity.')" class="forgot-link">Forgot Password?</a>
                </div>

                <button type="submit" class="btn-futuristic" style="width: 100%;">Sign in</button>

                <!-- Divider -->
                <div style="display: flex; align-items: center; margin: 24px 0; color: rgba(216, 215, 206, 0.4); font-size: 11px; font-weight: 500; letter-spacing: 0.5px;">
                    <div style="flex: 1; height: 1px; background: rgba(255, 255, 255, 0.06); margin-right: 16px;"></div>
                    OR
                    <div style="flex: 1; height: 1px; background: rgba(255, 255, 255, 0.06); margin-left: 16px;"></div>
                </div>

                <button type="button" class="google-btn" onclick="alert('Google authentication is not active in this demo version.')">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.06H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.94l2.85-2.22.81-.63z" fill="#FBBC05"/>
                        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.06l3.66 2.84c.87-2.6 3.3-4.52 6.16-4.52z" fill="#EA4335"/>
                    </svg>
                    Continue with Google
                </button>

                <div class="footer-links">
                    Don't have an account? <a href="/signup">Register</a>
                </div>
            </form>
        </div>
    </div>

    <script>
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value.trim().toLowerCase();
            const password = document.getElementById('password').value;

            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const result = await response.json();
                
                if (response.ok) {
                    window.location.href = '/dashboard';
                } else {
                    alert(result.error || 'Authentication failed');
                }
            } catch (err) {
                // Local Sandbox Fallback
                const raw = localStorage.getItem('candidates');
                const list = raw ? JSON.parse(raw) : [];
                
                const candidate = list.find(c => c.email.toLowerCase() === email && c.password === password);
                if (candidate) {
                    localStorage.setItem('active_session_email', email);
                    localStorage.setItem('active_session_candidate_id', candidate.candidate_id);
                    alert("Logged in locally in sandbox database mode.");
                    window.location.href = '/dashboard';
                } else {
                    alert("Invalid local credentials. Create an account first.");
                }
            }
        });
    </script>
</body>
</html>
