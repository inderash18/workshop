<svg viewBox="0 0 1440 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradient 1: Soft Gold to Cyan -->
    <linearGradient id="wave-grad-1" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%" stop-color="#faf9f6" stop-opacity="0"/>
      <stop offset="25%" stop-color="#fedc8a" stop-opacity="0.55"/>
      <stop offset="45%" stop-color="#4eabfc" stop-opacity="0.75"/>
      <stop offset="65%" stop-color="#fedc8a" stop-opacity="0.8"/>
      <stop offset="85%" stop-color="#faf9f6" stop-opacity="0"/>
    </linearGradient>
    
    <!-- Gradient 2: Cyan to Gold -->
    <linearGradient id="wave-grad-2" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="10%" stop-color="#faf9f6" stop-opacity="0"/>
      <stop offset="35%" stop-color="#4eabfc" stop-opacity="0.45"/>
      <stop offset="55%" stop-color="#fedc8a" stop-opacity="0.7"/>
      <stop offset="75%" stop-color="#4eabfc" stop-opacity="0.5"/>
      <stop offset="95%" stop-color="#faf9f6" stop-opacity="0"/>
    </linearGradient>
  </defs>
  
  <!-- Wave path 1 -->
  <path d="M 0 200 Q 360 80 720 220 T 1440 200 L 1440 250 Q 1080 270 720 180 T 0 250 Z" fill="url(#wave-grad-1)"/>
  
  <!-- Wave path 2 (offset for fluid overlay) -->
  <path d="M 0 220 Q 360 290 720 180 T 1440 220 L 1440 240 Q 1080 200 720 260 T 0 240 Z" fill="url(#wave-grad-2)" opacity="0.85"/>
</svg>
